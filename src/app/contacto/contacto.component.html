<section class="contacto">
  <h1>Contáctanos</h1>
  <p class="subtitle">¿Tienes alguna pregunta? Nos encantaría escucharte</p>
  
  <div class="contact-container">
    <form class="contact-form">
      <div class="form-group">
        <label for="name">Nombre</label>
        <input type="text" id="name" placeholder="Tu nombre completo" required>
      </div>
      
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="tu@correo.com" required>
      </div>
      
      <div class="form-group">
        <label for="message">Mensaje</label>
        <textarea id="message" rows="6" placeholder="Escribe tu mensaje aquí..." required></textarea>
      </div>
      
      <button type="submit" class="submit-btn">Enviar Mensaje</button>
    </form>
    
    <div class="contact-info">
      <div class="info-card">
        <div class="info-icon">📧</div>
        <h3>Email</h3>
        <p>contacto&#64;medmusic.com</p>
      </div>
      
      <div class="info-card">
        <div class="info-icon">📱</div>
        <h3>Redes Sociales</h3>
        <div class="social-links">
          <a href="#" class="social-link" title="Instagram">📷</a>
          <a href="#" class="social-link" title="Twitter">𝕏</a>
          <a href="#" class="social-link" title="TikTok">🎵</a>
          <a href="#" class="social-link" title="YouTube">▶️</a>
        </div>
      </div>
      
      <div class="info-card">
        <div class="info-icon">🌍</div>
        <h3>Ubicación</h3>
        <p>Global Music Studios</p>
      </div>
    </div>
  </div>
</section>
